debug: false
server:
  port: 8000
logging:
  level:
    root: INFO
    com.afa: INFO
    org.springframework.web: WARN
    org.springframework.web.reactive.function.client: WARN
    org.springframework.core.codec: WARN
    org.hibernate: ERROR
  config: classpath:logback-spring.xml
spring:
  datasource:
    url: ${POSTGRES_PROTOCOL}://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    hikari:
      driver-class-name: org.postgresql.Driver
      minimum-idle: 5
      maximum-pool-size: ${POSTGRES_MAXIMUM_POOL_SIZE:50}
      connection-test-query: "SELECT 1"
  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        globally_quoted_identifiers: true
        enable_lazy_load_no_trans: true
        ddl-auto: none
  servlet:
    multipart:
      file-size-threshold: 2KB
      max-file-size: 5MB
      max-request-size: 5MB
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
  liquibase:
    change-log: classpath:db/changelog/master.xml
    enabled: true
springdoc:
  swagger-ui:
    enabled: true
    tagsSorter: alpha
    operations-sorter: alpha
  api-docs:
    enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,env
  endpoint:
    health:
      show-components: always
      show-details: always
cache:
  v2:
    ttl:
      hours: 6
integrations:
  cdek:
    protocol: https
    host: ${INTEGRATION_CDEK_HOST}
    account: ${INTEGRATION_CDEK_ACCOUNT}
    secure: ${INTEGRATION_SECURE}
  ozon:
    market:
      host: ${INTEGRATION_OZON_MARKET_HOST}
      url: ${INTEGRATION_OZON_MARKET_URL}
      client:
        id: ${INTEGRATION_OZON_MARKET_CLIENT_ID}
        key: ${INTEGRATION_OZON_MARKET_CLIENT_KEY}
suppliers:
  sititek:
    feed:
      url: ${SUPPLIER_SITITEK_FEED_URL}
      login: ${SUPPLIER_SITITEK_FEED_LOGIN}
      password: ${SUPPLIER_SITITEK_FEED_PASSWORD}
      file: Price.xls
      dir:
        in: ${SUPPLIER_SITITEK_FEED_DIR_IN}